<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="55%" stop-color="#0f4c81"/>
      <stop offset="100%" stop-color="#0a2f4f"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ff7f50"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f4e1c1"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <clipPath id="round">
      <rect x="0" y="0" width="64" height="64" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="64" height="64" fill="url(#sky)"/>

    <!-- setting sun, partially hidden behind the horizon -->
    <circle cx="32" cy="30" r="13" fill="url(#sun)"/>

    <!-- horizon / first wave band -->
    <path d="M0,38 C10,32 22,44 32,38 C42,32 54,44 64,38 L64,64 L0,64 Z" fill="#0a2f4f"/>

    <!-- foreground wave -->
    <path d="M0,48 C9,42 17,54 26,48 C35,42 43,54 52,48 C57,45 61,46 64,48 L64,64 L0,64 Z" fill="url(#wave)" opacity="0.92"/>
  </g>
</svg>
